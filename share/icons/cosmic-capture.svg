<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <!-- Cosmic gradient: violet → indigo → cyan -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#7c3aed"/>
      <stop offset="55%"  stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>

    <!-- Lens body: deep glass with subtle inner glow -->
    <radialGradient id="lens" cx="42%" cy="38%" r="65%">
      <stop offset="0%"  stop-color="#1f2937"/>
      <stop offset="55%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>

    <!-- Soft highlight on lens glass -->
    <radialGradient id="lensHighlight" cx="35%" cy="30%" r="22%">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- Outer ring shine -->
    <linearGradient id="ringShine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.55"/>
    </linearGradient>

    <!-- Drop-shadow filter -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square backdrop -->
  <rect x="0" y="0" width="256" height="256" rx="56" ry="56" fill="url(#bg)"/>

  <!-- Faint cosmic stars -->
  <g fill="#ffffff" opacity="0.55">
    <circle cx="36"  cy="44"  r="1.8"/>
    <circle cx="220" cy="32"  r="1.2"/>
    <circle cx="40"  cy="220" r="1.4"/>
    <circle cx="218" cy="216" r="1.6"/>
    <circle cx="200" cy="80"  r="0.9"/>
    <circle cx="56"  cy="160" r="0.9"/>
  </g>

  <!-- Region selection brackets -->
  <g stroke="#ffffff" stroke-width="11" stroke-linecap="round" fill="none" opacity="0.96">
    <path d="M 56 96  L 56 56  L 96 56"/>
    <path d="M 160 56  L 200 56  L 200 96"/>
    <path d="M 56 160  L 56 200  L 96 200"/>
    <path d="M 160 200  L 200 200  L 200 160"/>
  </g>

  <!-- Camera lens -->
  <g filter="url(#softShadow)">
    <!-- outer metallic ring -->
    <circle cx="128" cy="128" r="46" fill="url(#ringShine)"/>
    <!-- glass body -->
    <circle cx="128" cy="128" r="38" fill="url(#lens)"/>
    <!-- subtle inner ring -->
    <circle cx="128" cy="128" r="38" fill="none" stroke="#94a3b8" stroke-width="1" opacity="0.45"/>
    <!-- highlight -->
    <circle cx="128" cy="128" r="38" fill="url(#lensHighlight)"/>
  </g>

  <!-- Recording dot in the lens -->
  <circle cx="128" cy="128" r="13" fill="#ef4444"/>
  <circle cx="124" cy="124" r="4"  fill="#ffffff" opacity="0.85"/>
</svg>
